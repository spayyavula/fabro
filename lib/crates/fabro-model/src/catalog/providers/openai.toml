[providers.openai]
display_name = "OpenAI"
adapter = "openai"
api_key_url = "https://platform.openai.com/api-keys"
base_url = "https://api.openai.com/v1"
priority = 90

[providers.openai.auth]
credentials = ["env:OPENAI_API_KEY", "vault:OPENAI_API_KEY", "vault:OPENAI_CODEX"]

[models."gpt-5.4"]
provider = "openai"
api_id = "gpt-5.4"
display_name = "GPT-5.4"
family = "gpt-5"
training = "2025-08-31"
knowledge_cutoff = "April 2025"
estimated_output_tps = 70
aliases = ["gpt54", "gpt-54", "gpt-5.2", "gpt5", "gpt-5.3-codex", "codex"]

[models."gpt-5.4".limits]
context_window = 272000
max_output = 128000

[models."gpt-5.4".features]
tools = true
vision = true
reasoning = true
reasoning_effort = "levels"

[models."gpt-5.4".costs]
input_cost_per_mtok = 2.5
output_cost_per_mtok = 15.0
cache_input_cost_per_mtok = 0.25

