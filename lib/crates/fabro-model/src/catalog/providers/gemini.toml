[providers.gemini]
display_name = "Gemini"
adapter = "gemini"
api_key_url = "https://aistudio.google.com/apikey"
base_url = "https://generativelanguage.googleapis.com/v1beta"
priority = 80

[providers.gemini.auth]
credentials = ["env:GEMINI_API_KEY", "env:GOOGLE_API_KEY", "vault:GEMINI_API_KEY"]
header = { custom = "x-goog-api-key" }

[models."gemini-3.1-pro-preview"]
provider = "gemini"
api_id = "gemini-3.1-pro-preview"
display_name = "Gemini 3.1 Pro (Preview)"
family = "gemini-3"
training = "2025-01-01"
knowledge_cutoff = "January 2025"
estimated_output_tps = 85
aliases = ["gemini-pro"]

[models."gemini-3.1-pro-preview".limits]
context_window = 1048576
max_output = 65536

[models."gemini-3.1-pro-preview".features]
tools = true
vision = true
reasoning = true
reasoning_effort = "levels"

[models."gemini-3.1-pro-preview".costs]
input_cost_per_mtok = 2.0
output_cost_per_mtok = 12.0
cache_input_cost_per_mtok = 0.5

